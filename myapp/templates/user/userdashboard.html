{% extends 'user/userlayout.html' %}
{% block user %}
<style>
.welcome{
    background: linear-gradient(135deg, #08703a, #034a24);
    border-radius: 20px;
    padding: 28px;
    color: #fff;
    margin-bottom: 24px;
}

/* Dashboard Cards */

.stat-card{
    background:#fff;
    border:1px solid #dbe5ff;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
    height:100%;
}

.stat-card:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 35px rgba(29,78,216,.15);
}

.stat-icon{
    width:60px;
    height:60px;
    border-radius:15px;
    background:#eef4ff;
    color:green;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    margin-bottom:18px;
}

.stat-card h3{
    font-size:32px;
    font-weight:700;
    color:#10204c;
    margin-bottom:8px;
}

.stat-card p{
    margin:0;
    color:#6c757d;
    font-size:15px;
    font-weight:500;
}



@media (max-width:992px){

    .stat-card{
        padding:20px;
    }

    .stat-card h3{
        font-size:28px;
    }

}

@media (max-width:576px){

    .stat-card{
        text-align:center;
    }

    .stat-icon{
        margin:0 auto 15px;
    }

}

.section-card{
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.section-title{
    font-size:28px;
    font-weight:700;
}

.btn-main{
    background:green;
    color:#fff;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
}

.btn-main:hover{
    color:#fff;
    background:green;
}

.table th{
    background:#eef3ff;
    color:green;
    padding:15px;
}

.table td{
    padding:15px;
    vertical-align:middle;
}

.badge-status{
    background:#e8efff;
    color:green;
    padding:6px 15px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}







</style>



















<div class="welcome">
    <h2>Welcome Admin, GGL Head Office</h2>
    <p class="mb-0">Manage complete file movement system from this dashboard.</p>
</div>

 <div class="row g-4 mb-4">

        <div class="col-lg-3 col-md-6">
            <div class="stat-card h-100">
                <div class="stat-icon">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <h3>4</h3>
                <p class="mb-0">Total Files</p>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="stat-card h-100">
                <div class="stat-icon">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <h3>4</h3>
                <p class="mb-0">Total Files</p>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="stat-card h-100">
                <div class="stat-icon">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <h3>4</h3>
                <p class="mb-0">Total Files</p>
            </div>
        </div>
        <div class="col-lg-3 col-md-6">
            <div class="stat-card h-100">

                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <h3>4</h3>
                <p class="mb-0">Total Files</p>
            </div>
        </div>
 </div>



  <div class="section-card">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="section-title mb-0">Recent File Movement</h4>

            <a href="" class="btn-main">
                View All
            </a>
        </div>

  <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead>
                    <tr>
                        <th>File No</th>
                        <th>Subject</th>

                    </tr>

                <tbody>

            </table>

        </div>
  </div>


{% endblock %}
