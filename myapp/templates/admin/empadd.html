{% extends 'admin/adminlayout.html' %}
{% block admin %}
<style>
.section-card {
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,.08);
}
.section-title {
    font-size: 28px;
    font-weight: 700;
}
.form-label {
    font-weight: 800;
}
.form-control, .form-select {
    height: 54px;
    border-radius: 12px;
    background: #f8fbff;
    border: 1px solid #d6e0f5;
}
.form-control {
    display: block;
    width: 100%;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5;
}
</style>

<div>
    <h4 style="font-weight: 900;">Add Employee</h4>
</div>
<div>
    <p>Add a new employee and assign department & role</p>
</div>

<div class="section-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="section-title mb-0">Employee Information</h4>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row">
            <div class="col-lg-6 mb-4">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter full name">
            </div>
            <div class="col-sm-6 mb-4">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username">
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email">
            </div>
            <div class="col-sm-6 mb-4">
                <label class="form-label">Mobile</label>
                <input type="number" name="mobile" class="form-control" placeholder="Enter mobile number">
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <label class="form-label">Employee ID</label>
                <input type="number" name="emp_id" class="form-control" placeholder="Enter employee ID">
            </div>
            <div class="col-sm-6 mb-4">
                <label class="form-label">Department</label>
                <select name="department" class="form-select">
                    <option value="">-- Select Department --</option>
                    {% for i in ab %}
                    <option value="{{ i.department_name }}">{{ i.department_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <label class="form-label">Designation</label>
                <input type="text" name="designation" class="form-control" placeholder="Enter designation">
            </div>
            <div class="col-sm-6 mb-4">
                <label class="form-label">Role</label>
                <select name="role" class="form-select">
                    <option value="">-- Select Role --</option>
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">-- Select Status --</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="col-sm-6 mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password">
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <label class="form-label">Photo</label>
                <input type="file" name="photo" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12 mb-4">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" style="height:100px;"></textarea>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-sm-12">
                <button type="submit" class="btn btn-primary">Save Employee</button>
                <a href="/" class="btn btn-dark">Back</a>
            </div>
        </div>

    </form>
</div>

{% endblock %}
