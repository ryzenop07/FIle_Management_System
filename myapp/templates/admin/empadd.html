{% extends 'admin/adminlayout.html' %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

{% block admin %}

<form method="post" enctype="multipart/form-data">
{% csrf_token %}
<div class="container">
    <div class="row">
        <div class="col-sm-12">
             <h4>Add Employyee</h4>
            <p>Lorem ipsum dolor sit amet.</p>
        </div>
    </div>

    <div class="row">
        <div class="col-sm-12">
            <h5>Employyee Information</h5>
        </div>
    </div>

 <div class="row">
        <div class="col-sm-6">
            <p>Full Name</p>
            <input type="text" class="form-control" name="name">
        </div>
        <div class="col-sm-6">
            <p>Username</p>
            <input type="text" id="" class="form-control" name="username">
        </div>
    </div>


 <div class="row">
        <div class="col-sm-6">
            <p>Email</p>
            <input type="email" class="form-control" name="email">
        </div>
        <div class="col-sm-6">
            <p>Mobile</p>
            <input type="number" id="" class="form-control" name="mobile">
        </div>
    </div>

 <div class="row">
        <div class="col-sm-6">
            <p>Employee id</p>
            <input type="number" class="form-control" name="emp_id">
        </div>
        <div class="col-sm-6">
                <p>Department</p>
          
           <select class="form-control" name="department">
    <option value="Active">Active</option>
    <option value="UnActive">UnActive</option>
</select>
        </div>
    </div>


 <div class="row">
        <div class="col-sm-6">
            <p>Designation</p>
            <input type="text" class="form-control" name="designation">
        </div>
        <div class="col-sm-6">
                      <p>Static Role</p>
          
           <select class="form-control" name="role">
    <option value="User">User</option>
    <option value="Admin">Admin</option>
</select>
        </div>
    </div>



 <div class="row">
        <div class="col-sm-6">
            <input type="hidden" name="User">
           <label class="form-label">Status</label>
            <select name="status" id="">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>
        <div class="col-sm-6">
            <p>Password</p>
            <input type="password" id="" class="form-control" name="password">
        </div>
    </div>



 <div class="row">
        <div class="col-sm-6">
            <p>Photo</p>
            <input type="file" class="form-control" name="photo">
        </div>
        <div class="col-sm-6">
        
        </div>
    </div>



<div class="row">
    <div class="col-sm-12">
        <p class="mt-3">Address</p>
        <textarea name="address" id="" class="w-100"></textarea> 
    </div>
</div>


   <div class="row">
            <div class="col-sm-12">
          <button type="submit" class="btn btn-success mt-3">
    Save Employee
</button>
               <a href="/" class="btn btn-dark mt-3">
    Back
</a>
               
            </div>
        </div>





</div>



</form>


{% endblock %}










 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
</body>
</html>
